<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Les arbres de Paris</title>
  </head>
  <body>
    <h1>Paris</h1>
    <div id="welcome">
      <div id="arbresCard" class="welcome-card">
        <video class="card-video" muted loop>
          <source src="arbres.mp4" type="video/mp4" />
        </video>

        <div class="card-content">
          <p>Les arbres à Paris</p>
        </div>
      </div>
      <div id="parisCard" class="welcome-card">
        <video class="card-video" muted loop>
          <source src="paris.mp4" type="video/mp4" />
        </video>

        <div class="card-content">
          <p>Que faire à Paris</p>
        </div>
      </div>
    </div>
    <div id="mainContent">
      <div class="search">
        <input type="text" id="searchInput" placeholder="Rechercher un arbre" />
        <button id="searchBtn">Rechercher</button>
        <button id="homeBtn">Accueil</button>
      </div>
      <div class="list"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
